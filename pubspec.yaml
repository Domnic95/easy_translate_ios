name: easy_translate
description: "Easy Translate — A Flutter translator app."

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Local storage (Hive boxes + SharedPreferences)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Translation + on-device language identification + OCR text recognition
  translator: ^1.0.3+1
  google_mlkit_language_id: ^0.13.1
  google_mlkit_text_recognition: ^0.15.1

  # Voice in / voice out
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2

  # Image picking + cropping for OCR
  image_picker: ^1.1.2
  image_cropper: ^12.2.1

  image: ^4.3.0

  # Live camera preview for Lens-style camera translate
  camera: ^0.12.0+1

  # UI / animations
  flutter_animate: ^4.5.0
  google_fonts: ^8.1.0
  lottie: ^3.1.2

  # Utils
  share_plus: ^13.1.0
  intl: ^0.20.2
  uuid: ^4.5.1
  package_info_plus: ^10.1.0

  # Google Ads
  google_mobile_ads: ^9.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
